# SINAC Configuration
# This file defines the behavior of the decision engine for data imputation and modeling.

imputation_rules:
  default:
    method: "interpolate"
    max_gap_pct: 0.10
  high_volatility:
    method: "mean"
    max_gap_pct: 0.05

modeling_rules:
  time_series:
    min_observations: 30
    preferred_model: "prophet"
